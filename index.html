<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3D Viewer</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ─────────────────────────────────────────────── */
        #topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            z-index: 10;
            flex-shrink: 0;
        }

        #topbar h1 {
            font-size: 1rem;
            font-weight: 600;
            color: #e94560;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }

        #upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        #upload-btn:hover { background: #c73652; }

        #file-input { display: none; }

        #status {
            font-size: 0.78rem;
            color: #9ab;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        /* ── Main area ───────────────────────────────────────────── */
        #viewer-wrap {
            position: relative;
            flex: 1;
            overflow: hidden;
        }

        #myCanvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        /* ── Nav cube ────────────────────────────────────────────── */
        #myNavCubeCanvas {
            position: absolute;
            width: 120px;
            height: 120px;
            bottom: 16px;
            right: 16px;
            z-index: 20;
            border-radius: 6px;
            overflow: hidden;
        }

        @media (min-width: 600px) {
            #myNavCubeCanvas {
                width: 180px;
                height: 180px;
            }
        }

        /* ── Drop overlay ─────────────────────────────────────────── */
        #drop-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(26, 26, 46, 0.92);
            z-index: 30;
            gap: 20px;
            pointer-events: none;
        }

        #drop-overlay.hidden { display: none; }

        #drop-overlay svg {
            width: 64px;
            height: 64px;
            opacity: 0.6;
        }

        #drop-overlay p {
            font-size: 1.1rem;
            color: #9ab;
            text-align: center;
            padding: 0 24px;
        }

        #drop-overlay p strong { color: #e94560; }

        /* ── Drag-active highlight ───────────────────────────────── */
        body.drag-over #drop-overlay {
            border: 3px dashed #e94560;
        }

        /* ── Controls hint ───────────────────────────────────────── */
        #hint {
            position: absolute;
            bottom: 16px;
            left: 16px;
            font-size: 0.7rem;
            color: #567;
            line-height: 1.6;
            z-index: 20;
            pointer-events: none;
        }

        /* ── Model list panel ────────────────────────────────────── */
        #model-list-panel {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 25;
            background: rgba(22, 33, 62, 0.92);
            border: 1px solid #0f3460;
            border-radius: 8px;
            min-width: 200px;
            max-width: 300px;
            max-height: calc(100% - 16px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        #model-list-panel.hidden { display: none; }

        #model-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 12px;
            border-bottom: 1px solid #0f3460;
            font-size: 0.72rem;
            font-weight: 700;
            color: #9ab;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            cursor: pointer;
            user-select: none;
        }

        #model-list-header:hover { color: #e0e0e0; }

        #model-list-toggle-icon { font-size: 0.6rem; }

        #model-list-body { padding: 4px 0; }

        .model-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            font-size: 0.75rem;
            color: #cde;
            border-bottom: 1px solid rgba(15, 52, 96, 0.4);
        }

        .model-item:last-child { border-bottom: none; }

        .model-item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .model-item-type {
            font-size: 0.62rem;
            padding: 1px 4px;
            border-radius: 3px;
            background: #0f3460;
            color: #9ab;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .model-item-remove {
            background: none;
            border: none;
            color: #e94560;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0 2px;
            opacity: 0.6;
            flex-shrink: 0;
        }

        .model-item-remove:hover { opacity: 1; }
    </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
    <h1>3D Viewer</h1>
    <button id="upload-btn" onclick="document.getElementById('file-input').click()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Open File
    </button>
    <input type="file" id="file-input" accept=".ifc,.obj,.las,.laz" multiple>
    <span id="status">No models loaded</span>
</div>

<!-- 3D viewport -->
<div id="viewer-wrap">
    <canvas id="myCanvas"></canvas>
    <canvas id="myNavCubeCanvas"></canvas>

    <!-- Loaded models list -->
    <div id="model-list-panel" class="hidden">
        <div id="model-list-header">
            <span>Loaded Models</span>
            <span id="model-list-toggle-icon">▲</span>
        </div>
        <div id="model-list-body"></div>
    </div>

    <!-- Drop-to-open overlay (shown until a model is loaded) -->
    <div id="drop-overlay">
        <svg viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <p>Click <strong>Open File</strong> or drop a file here<br>
        <strong>IFC · OBJ · LAS/LAZ</strong></p>
    </div>

    <div id="hint">
        🖱 Left drag: orbit &nbsp;·&nbsp; Right drag: pan &nbsp;·&nbsp; Scroll: zoom<br>
        📱 One finger: orbit &nbsp;·&nbsp; Two fingers: pan / pinch-zoom
    </div>
</div>

<script type="module">

import { Viewer, WebIFCLoaderPlugin, NavCubePlugin, OBJLoaderPlugin, LASLoaderPlugin }
    from "https://cdn.jsdelivr.net/npm/@xeokit/xeokit-sdk@2.6.78/dist/xeokit-sdk.min.es.js";

import * as WebIFC
    from "https://cdn.jsdelivr.net/npm/web-ifc@0.0.51/web-ifc-api.js";

// ── Set up viewer ──────────────────────────────────────────────────────────
const viewer = new Viewer({
    canvasId: "myCanvas",
    transparent: true,
    dtxEnabled: true
});

viewer.camera.eye  = [-3.933, 2.855, 27.018];
viewer.camera.look = [4.400,  3.724,  8.899];
viewer.camera.up   = [-0.018, 0.999,  0.039];

new NavCubePlugin(viewer, {
    canvasId: "myNavCubeCanvas",
    visible: true,
    size: 180,
    alignment: "bottomRight",
    bottomMargin: 0,
    rightMargin: 0
});

// ── Initialise loaders ─────────────────────────────────────────────────────
const IfcAPI = new WebIFC.IfcAPI();
IfcAPI.SetWasmPath("https://cdn.jsdelivr.net/npm/web-ifc@0.0.51/");

let ifcLoader  = null;
let objLoader  = null;
let lasLoader  = null;

// Multi-model registry: id -> { name, ext, entity, blobUrl }
const loadedModels = {};
let modelCounter = 0;

IfcAPI.Init().then(() => {
    ifcLoader = new WebIFCLoaderPlugin(viewer, { WebIFC, IfcAPI });
    objLoader = new OBJLoaderPlugin(viewer);
    lasLoader = new LASLoaderPlugin(viewer);
    setStatus("Ready — open a file to begin");
}).catch(err => {
    setStatus("Failed to initialise web-ifc: " + err.message);
});

// ── UI helpers ─────────────────────────────────────────────────────────────
const overlay  = document.getElementById("drop-overlay");
const statusEl = document.getElementById("status");

function setStatus(msg) { statusEl.textContent = msg; }

function hideOverlay() { overlay.classList.add("hidden"); }

// ── Model list ─────────────────────────────────────────────────────────────
const modelListPanel  = document.getElementById("model-list-panel");
const modelListBody   = document.getElementById("model-list-body");

function refreshModelList() {
    const ids = Object.keys(loadedModels);
    if (ids.length === 0) {
        modelListPanel.classList.add("hidden");
        return;
    }
    modelListPanel.classList.remove("hidden");
    modelListBody.innerHTML = "";
    for (const id of ids) {
        const entry = loadedModels[id];
        const item  = document.createElement("div");
        item.className = "model-item";

        const nameEl = document.createElement("span");
        nameEl.className = "model-item-name";
        nameEl.title = entry.name;
        nameEl.textContent = entry.name;

        const typeEl = document.createElement("span");
        typeEl.className = "model-item-type";
        typeEl.textContent = entry.ext;

        const removeBtn = document.createElement("button");
        removeBtn.className = "model-item-remove";
        removeBtn.title = "Remove";
        removeBtn.textContent = "×";
        removeBtn.addEventListener("click", () => removeModel(id));

        item.appendChild(nameEl);
        item.appendChild(typeEl);
        item.appendChild(removeBtn);
        modelListBody.appendChild(item);
    }
}

function removeModel(id) {
    const entry = loadedModels[id];
    if (!entry) return;
    if (entry.entity && typeof entry.entity.destroy === "function") {
        entry.entity.destroy();
    }
    if (entry.blobUrl) {
        URL.revokeObjectURL(entry.blobUrl);
    }
    delete loadedModels[id];
    refreshModelList();
    const remaining = Object.keys(loadedModels).length;
    setStatus(remaining === 0 ? "No models loaded" : `${remaining} model(s) loaded`);
    if (remaining === 0) overlay.classList.remove("hidden");
}

document.getElementById("model-list-header").addEventListener("click", () => {
    const collapsed = modelListBody.style.display === "none";
    modelListBody.style.display = collapsed ? "" : "none";
    document.getElementById("model-list-toggle-icon").textContent = collapsed ? "▲" : "▼";
});

// ── Loaders ────────────────────────────────────────────────────────────────
function _loadIFC(arrayBuffer, filename) {
    if (!ifcLoader) { setStatus("Initialising — please wait…"); return; }

    const id = "model-" + (++modelCounter);
    setStatus("Loading " + filename + "…");
    hideOverlay();

    const t0    = performance.now();
    const model = ifcLoader.load({
        id,
        ifc: arrayBuffer,
        loadMetadata: true,
        excludeTypes: ["IfcSpace"],
        edges: true
    });

    model.on("loaded", () => {
        const secs = ((performance.now() - t0) / 1000).toFixed(2);
        loadedModels[id] = { name: filename, ext: "ifc", entity: model, blobUrl: null };
        refreshModelList();
        setStatus(`${filename}  ·  ${model.numEntities} objects  ·  loaded in ${secs}s`);
        viewer.cameraFlight.jumpTo(model);
    });

    model.on("error", e => {
        setStatus("Error loading IFC: " + e);
    });
}


function _loadOBJ(blobUrl, filename) {
    if (!objLoader) { setStatus("Initialising — please wait…"); return; }

    const id = "model-" + (++modelCounter);
    setStatus("Loading " + filename + "…");
    hideOverlay();

    const t0    = performance.now();
    const model = objLoader.load({ id, src: blobUrl, edges: true });

    model.on("loaded", () => {
        const secs = ((performance.now() - t0) / 1000).toFixed(2);
        loadedModels[id] = { name: filename, ext: "obj", entity: model, blobUrl };
        refreshModelList();
        setStatus(`${filename}  ·  ${model.numEntities} objects  ·  loaded in ${secs}s`);
        viewer.cameraFlight.jumpTo(model);
    });

    model.on("error", e => {
        URL.revokeObjectURL(blobUrl);
        setStatus("Error loading OBJ: " + e);
    });
}

function _loadLAS(arrayBuffer, filename, ext) {
    if (!lasLoader) { setStatus("Initialising — please wait…"); return; }

    const id = "model-" + (++modelCounter);
    setStatus("Loading " + filename + "…");
    hideOverlay();

    const t0    = performance.now();
    const model = lasLoader.load({ id, las: arrayBuffer, rotation: [-90, 0, 0] });

    model.on("loaded", () => {
        const secs = ((performance.now() - t0) / 1000).toFixed(2);
        loadedModels[id] = { name: filename, ext, entity: model, blobUrl: null };
        refreshModelList();
        setStatus(`${filename}  ·  loaded in ${secs}s`);
        viewer.cameraFlight.jumpTo(model);
    });

    model.on("error", e => {
        setStatus("Error loading LAS/LAZ: " + e);
    });
}

// ── File dispatcher ────────────────────────────────────────────────────────
function handleFile(file) {
    const ext = file.name.split(".").pop().toLowerCase();
    if (ext === "ifc") {
        const reader = new FileReader();
        reader.onload = ev => _loadIFC(ev.target.result, file.name);
        reader.readAsArrayBuffer(file);
    } else if (ext === "obj") {
        _loadOBJ(URL.createObjectURL(file), file.name);
    } else if (ext === "las" || ext === "laz") {
        const reader = new FileReader();
        reader.onload = ev => _loadLAS(ev.target.result, file.name, ext);
        reader.readAsArrayBuffer(file);
    } else {
        setStatus("Unsupported format: " + file.name);
    }
}

// ── File input ─────────────────────────────────────────────────────────────
document.getElementById("file-input").addEventListener("change", e => {
    Array.from(e.target.files).forEach(handleFile);
    e.target.value = "";
});

// ── Drag-and-drop ──────────────────────────────────────────────────────────
document.body.addEventListener("dragover", e => {
    e.preventDefault();
    document.body.classList.add("drag-over");
});

document.body.addEventListener("dragleave", e => {
    if (!e.relatedTarget || !document.body.contains(e.relatedTarget)) {
        document.body.classList.remove("drag-over");
    }
});

document.body.addEventListener("drop", e => {
    e.preventDefault();
    document.body.classList.remove("drag-over");
    Array.from(e.dataTransfer.files).forEach(handleFile);
});

</script>
</body>
</html>
